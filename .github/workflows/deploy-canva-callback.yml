name: Deploy Canva callback page

on:
  push:
    branches:
      - main
      - main_dev
    paths:
      - deploy/canva_auth/**
      - .github/workflows/deploy-canva-callback.yml
  workflow_dispatch:

jobs:
  deploy-canva-callback:
    name: Deploy Canva callback
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy callback via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.FTP_USERNAME }}
          server: ${{ secrets.FTP_SERVER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          local_path: ./deploy/canva_auth/*
          remote_path: ${{ github.ref_name == 'main_dev' && '/apps/canva_auth_dev/' || '/apps/canva_auth/' }}
          sftp_only: true
          delete_remote_files: false
